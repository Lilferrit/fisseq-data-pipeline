output_dir: .
output_root: null
log_level: info
input_file: filtered_cells.parquet
label_column: meta_aa_changes
wt_label: WT
random_state: 42
feature_cols: null
min_cells: 25
downsample_wt: 50
save_splits: true
xgboost:
  num_boost_round: 100
  early_stopping_rounds: 5
  weigh_samples: true
  params:
    nthread: -1
    max_depth: 3
    colsample_bytree: 0.7
    colsample_bylevel: 0.7
    colsample_bynode: 0.7
    subsample: 0.5
