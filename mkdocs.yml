site_name: Fisseq Data Pipeline
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Installation: installation.md
  - Nextflow Workflow: nextflow.md
  - CLI Reference:
      - Input: cli/input.md
      - QC Filter: cli/qcfilter.md
      - Normalize: cli/normalize.md
      - Aggregate: cli/aggregate.md
      - Feature Selection: cli/features.md
      - Batch Correction: cli/batchcorrect.md
      - PERMANOVA: cli/permanova.md
      - One-vs-WT: cli/ovwt.md
      - OvWT Cell Scores: cli/ovwtcellscores.md
      - Batch vs. Batch: cli/batchvsbatch.md
  - API Reference:
      - input: api/input.md
      - qcfilter: api/qcfilter.md
      - normalize: api/normalize.md
      - aggregate: api/aggregate.md
      - features: api/features.md
      - batchcorrect: api/batchcorrect.md
      - permanova: api/permanova.md
      - ovwt: api/ovwt.md
      - ovwtcellscores: api/ovwtcellscores.md
      - batchvsbatch: api/batchvsbatch.md
      - config: api/config.md
      - utils: api/utils.md
  - Walkthrough: walkthrough.md
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_root_heading: true
            show_signature: true
            separate_signature: true
            show_signature_annotations: true
            show_source: true
            heading_level: 3
